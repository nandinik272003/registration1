<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <center>
    <h1>Student Registration</h1>
    <form>
        <lable>Student Name:</lable><br>
        <input type="text"placeholder="Enter  your FullName" required><br><br>

        <label>Email:</label>
        <br>
        <input type="email" placeholder="Enter your  Email">
        <br><br>

        <label>Age:</label><br>
        <input type="number" placeholder="Enter  your Age"><br><br>
         
        <lable>phone Number:</lable><br>
        <input type="tel" placeholder="Enter your Number "><br><br>
        
        <lable>Password:</lable><br>
        <input type="password" placeholder="create password"required minlength="4"><br><br>
        
        <label>Gender:</label><br>
        <input type="radio" name="gender"value="male" required>Male<br>
        <input type="radio" name="gender"value="female"required>Female<br>
        <input type="radio" name="gender"value="other"required>Other<br><br>
        
        <label>Date of Birth:</label><br>
        <input type="date" name="dob"required><br><br>
        
        <label>Course:</label><br>
        <select name="Course">
            <option value="">Select Course</option>
            <option>BCA</option><br>
            <option>BE</option><br>
            <option>BSc</option><br>
            <option>MBA</option><br>
            <option>BCom</option><br>
            <option>BA</option><br>
        </select>
        <br><br>

        <label>Address:</label><br>
        <textarea name="address" row="4" cols="20" name="Enter Address"></textarea>
        <br><br>

        <input type="checkbox" required>
        <label>I agree to Term and Conditions </label><br><br>



        <button type="Submit">Register</button>
        <button type="reset">Clear</button>
        <br>
    </form>
    
    </center>
    <center>
        <h1>Login Page</h1>
           <form>
            <label>Email Address:</label><br>
            <input type="email" placeholder="Enter your  Email" required>
            <br><br>
            <label>Password:</label><br>
            <input type="password" placeholder="Enter your  Password" required>
            <br><br>
            <input type="checkbox" required>
            
            <a href="#">Forgot password?</a>
            <br><br>
            <button type="Login">Login</button><br></br>
                <div>you don't have account?</div>
                   <a href="#">sigup</a>
                
          
    </center>
